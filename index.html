<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maliki Law Firm - Cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Maliki Law Firm</h1>
        <p>Sistem Manajemen Perkara (Cloud Database)</p>
    </header>

    <section>
        <h3>Input Perkara Baru</h3>
        <div style="text-align: left; width: 90%; margin: 0 auto;">
            <label>Nama Klien:</label><br>
            <input type="text" id="namaKlien" placeholder="Contoh: Budi Santoso"><br><br>
            
            <label>Nomor Perkara:</label><br>
            <input type="text" id="noPerkara" placeholder="Contoh: 123/Pdt.G/2026/PN Mtr"><br><br>
            
            <button id="btnSimpan">Simpan ke Cloud</button>
        </div>
    </section>

    <table id="tabelPerkara">
        <hr>
<section style="margin-top: 30px; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
    <h3>Asisten Jurnal Hukum AI</h3>
    <p>Gunakan fitur ini untuk membantu riset tesis atau analisis kasus.</p>
    <textarea id="inputAI" placeholder="Tulis judul jurnal atau isu hukum di sini..." rows="4" style="width: 100%; padding: 10px;"></textarea><br><br>
    <button id="btnTanyaAI" style="background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Minta AI Tulis Draf</button>
    
    <div id="hasilAI" style="background: #fdfdfd; padding: 15px; margin-top: 20px; border-left: 5px solid #007bff; min-height: 50px; color: #333;">
        Hasil analisis AI akan muncul di sini...
    </div>
</section>
        <thead>
            <tr>
                <th>No. Perkara</th>
                <th>Nama Klien</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="isiTabel"></tbody>
    </table>

    <script type="module" src="script.js"></script>
</body>
</html>
